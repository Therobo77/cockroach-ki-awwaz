version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: cockroach-ki-awwaz-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cockroach_ki_awwaz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cockroach_ki_awwaz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
